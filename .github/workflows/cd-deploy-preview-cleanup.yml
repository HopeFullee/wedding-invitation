name: CD Deploy Preview Cleanup

# main(master)을 대상으로 한 PR이 닫힐 때(merge 여부와 무관하게) 실행됩니다.
on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  cleanup-preview:
    name: Remove Vercel Preview Deployments
    runs-on: ubuntu-latest

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      BRANCH: ${{ github.event.pull_request.head.ref }}

    steps:
      # Vercel REST API로 이 PR의 소스 브랜치(head_ref)에 해당하는 preview 배포 목록을 조회한 뒤,
      # 하나씩 삭제합니다. (vercel CLI 대신 REST API를 쓰는 이유: 배포 ID를 미리 알 필요 없이
      # "이 브랜치의 배포 전부"를 조건으로 찾아 지울 수 있어서입니다)
      #
      # 참고: teamId 파라미터는 Vercel Team(조직) 플랜에서만 필요합니다.
      # Hobby(개인) 플랜 프로젝트는 projectId + token만으로 조회/삭제가 가능하므로 넣지 않습니다.
      # 만약 나중에 Team 플랜으로 전환하신다면, VERCEL_TEAM_ID 시크릿을 추가하고
      # 아래 두 curl 요청의 쿼리스트링에 &teamId=${VERCEL_TEAM_ID}를 다시 붙여주시면 됩니다.
      - name: 이 브랜치의 Preview 배포 삭제
        run: |
          # 1. Vercel API 호출
          RESPONSE=$(curl -s -X GET \
          "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&target=preview&branch=${BRANCH}&limit=100" \
          -H "Authorization: Bearer ${VERCEL_TOKEN}")

          # [디버깅용] 만약 Vercel 토큰 문제나 다른 에러가 있다면 여기서 잡힙니다.
          ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          if [ -n "$ERROR_MSG" ]; then
            echo "❌ Vercel API 에러 발생: $ERROR_MSG"
            echo "전체 응답 객체: $RESPONSE"
            exit 1
          fi

          # 2. 배포 ID 추출
          DEPLOYMENT_IDS=$(echo "$RESPONSE" | jq -r --arg branch "$BRANCH" '.deployments[] | select(.meta.githubBranch == $branch) | .uid')

          if [ -z "$DEPLOYMENT_IDS" ]; then
            echo "삭제할 preview 배포가 없습니다. (Vercel 반환 데이터가 비어있음)"
            exit 0
          fi

          # 3. 루프를 돌며 삭제 실행
          for ID in $DEPLOYMENT_IDS; do
            echo "삭제 중: $ID"
            curl -s -X DELETE \
              "https://api.vercel.com/v13/deployments/${ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}"
            echo "삭제 완료: $ID"
          done

name: CD Deploy Preview

# "CI Test" 워크플로우가 완료되면 트리거됩니다.
# 아래 job의 if 조건에서 "pull_request 이벤트로 트리거되었고, 성공했을 때"만 preview를 배포합니다.
on:
  workflow_run:
    workflows: ["CI Test"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write # preview URL을 PR 코멘트로 게시하기 위함

concurrency:
  # 같은 PR에서 여러 번 push해도, 이전 preview 배포 작업은 취소하고 최신 것만 남깁니다.
  group: cd-deploy-preview-${{ github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy to Vercel (Preview)
    runs-on: ubuntu-latest
    # 조건 1) CI Test가 성공으로 끝났을 것
    # 조건 2) 그 실행이 "pull_request" 이벤트(=PR 리뷰 단계)에 의한 것일 것
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'

    steps:
      # PR의 최신 커밋(head_sha) 기준으로 체크아웃합니다.
      - name: 코드 체크아웃 (PR head 기준)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vercel CLI 설치
        run: npm install --global vercel@latest

      - name: Vercel 프로젝트 환경 정보 가져오기
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 빌드 (Vercel 빌드 아티팩트 생성)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Vercel에 Preview 배포
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # PR에 코멘트를 남깁니다. 같은 PR에 여러 번 push해도 코멘트를 새로 쌓지 않고,
      # 기존에 남긴 "Preview 배포" 코멘트를 찾아 내용만 갱신합니다(sticky comment).
      - name: PR에 Preview URL 코멘트 게시
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.workflow_run.pull_requests[0].number;
            const marker = "<!-- vercel-preview-comment -->";
            const body = `${marker}\n### ▲ Vercel Preview 배포 완료\n\n- **URL**: ${{ steps.deploy.outputs.url }}\n- **커밋**: \`${{ github.event.workflow_run.head_sha }}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.data.find((c) => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

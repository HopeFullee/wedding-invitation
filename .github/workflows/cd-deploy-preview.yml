name: CD Deploy Preview

# PR 리뷰 단계(main/master 대상)에서 직접 트리거됩니다.
# CI Test(ci-test-pr.yml)와는 독립적으로 병렬 실행됩니다.
#
# 왜 CI Test 성공을 기다리지 않는가:
# Preview 배포가 실패해도 실서비스(Production)에는 아무 영향이 없고,
# 오히려 리뷰어가 빌드 문제를 조기에 발견하는 계기가 됩니다.
# 반면 CI Test 완료를 기다리는 workflow_run 방식은 GitHub의
# Required status check 시스템과 호환되지 않아(체크가 영구히
# "Waiting for status to be reported" 상태로 멈추는 알려진 한계),
# "merge 전에 preview 배포가 끝나있어야 한다"는 목적 자체를 달성할 수 없었습니다.
# 그래서 이 워크플로우는 pull_request로 직접 트리거하고, 이 job을
# Required status check로 등록해 "merge는 preview 배포 완료 후에만 가능"하게 만듭니다.
on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write # preview URL을 PR 코멘트로 게시하기 위함

concurrency:
  # cancel-in-progress를 true로 두면, 취소 신호와 "성공" 보고 사이의 타이밍 레이스로
  # Required status check가 뒤늦게 "cancelled"로 뒤집히는 문제가 발생할 수 있습니다.
  # false로 두면 취소 대신 "대기열에 줄서서 순서대로 실행"하게 되어, 동시에 두 개의
  # vercel deploy가 같은 브랜치를 두고 충돌하는 것도 막으면서 레이스 컨디션도 없앱니다.
  group: cd-deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  deploy-preview:
    name: Deploy to Vercel (Preview)
    runs-on: ubuntu-latest

    steps:
      # 새 preview를 배포하기 전에, 같은 PR(브랜치)의 이전 preview 배포를 먼저 정리합니다.
      # (push할 때마다 쌓이는 오래된 preview를 남겨두지 않기 위함입니다.
      #  cd-deploy-preview-cleanup.yml과 동일한 로직이며, "PR이 닫힐 때"가 아니라
      #  "새로 배포하기 직전"이라는 시점만 다릅니다)
      - name: 이전 Preview 배포 정리
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          # [필수] Vercel이 인식하는 공식 Git 메타데이터 환경변수
          VERCEL_GIT_COMMIT_REF: ${{ github.event.pull_request.head.ref }}
          VERCEL_GIT_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "브랜치 '$BRANCH'의 기존 preview 배포를 조회합니다..."

          RESPONSE=$(curl -s -X GET \
            "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&target=preview&limit=100" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")

          DEPLOYMENT_IDS=$(echo "$RESPONSE" | jq -r '.deployments[].uid')

          if [ -z "$DEPLOYMENT_IDS" ]; then
            echo "정리할 이전 preview 배포가 없습니다."
            exit 0
          fi

          for ID in $DEPLOYMENT_IDS; do
            echo "삭제 중: $ID"
            curl -s -X DELETE \
              "https://api.vercel.com/v13/deployments/${ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}"
            echo "삭제 완료: $ID"
          done

      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vercel CLI 설치
        run: npm install --global vercel@latest

      - name: Vercel 프로젝트 환경 정보 가져오기
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 빌드 (Vercel 빌드 아티팩트 생성)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Preview 배포는 실패해도 job 전체를 실패시키지 않습니다(continue-on-error).
      # "merge 전에 배포가 끝나있는지"만 확인하면 되고, "배포가 성공했는지"는
      # merge를 막을 조건이 아니기 때문입니다. 실패해도 PR 코멘트로 실패 사실을 알려줍니다.
      - name: Vercel에 Preview 배포
        id: deploy
        continue-on-error: true
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # PR에 코멘트를 남깁니다. 같은 PR에 여러 번 push해도 코멘트를 새로 쌓지 않고,
      # 기존에 남긴 "Preview 배포" 코멘트를 찾아 내용만 갱신합니다(sticky comment).
      # !cancelled()가 없으면, 새 push로 인해 이 실행 자체가 취소된 경우에도
      # 이 스텝이 실행되어 "배포 실패"로 잘못 안내하게 됩니다.
      - name: PR에 Preview URL 코멘트 게시
        if: always() && !cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- vercel-preview-comment -->";
            const deployOutcome = "${{ steps.deploy.outcome }}";
            const url = "${{ steps.deploy.outputs.url }}";
            const sha = context.payload.pull_request.head.sha;

            const body = deployOutcome === "success"
              ? `${marker}\n### ▲ Vercel Preview 배포 완료\n\n- **URL**: ${url}\n- **커밋**: \`${sha}\``
              : `${marker}\n### ⚠️ Vercel Preview 배포 실패\n\n- **커밋**: \`${sha}\`\n- Actions 로그를 확인해주세요. (실서비스에는 영향 없습니다)`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find((c) => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

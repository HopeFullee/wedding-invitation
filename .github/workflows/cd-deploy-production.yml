name: CD Deploy Production

# "CI Test" 워크플로우가 완료되면 트리거됩니다.
# 아래 job의 if 조건에서 "push 이벤트로 트리거되었고, 성공했을 때"만 실제로 배포합니다.
on:
  workflow_run:
    workflows: ["CI Test Merge"]
    types:
      - completed

# Vercel에 배포만 하면 되므로 코드를 읽는 권한만 있으면 됩니다.
permissions:
  contents: read

concurrency:
  group: cd-deploy-production
  cancel-in-progress: false # production 배포는 중간에 취소하지 않고 순서대로 진행합니다.

jobs:
  deploy-production:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    # 조건 1) CI Test가 성공으로 끝났을 것
    # 조건 2) 그 실행이 "push" 이벤트(=main/master로의 merge)에 의한 것일 것
    #        (PR 리뷰 단계의 pull_request 이벤트에서는 절대 production을 배포하지 않습니다)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')

    steps:
      # merge된 실제 커밋(head_sha) 기준으로 체크아웃합니다.
      - name: 코드 체크아웃 (merge된 커밋 기준)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vercel CLI 설치
        run: npm install --global vercel@latest

      # VERCEL_ORG_ID는 Vercel CLI가 요구하는 환경변수명입니다.
      # Hope님이 만들어두신 VERCEL_USER_ID 시크릿 값을 그대로 매핑해서 사용합니다.
      - name: Vercel 프로젝트 환경 정보 가져오기
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 프로덕션 빌드 (Vercel 빌드 아티팩트 생성)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Vercel에 Production 배포
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 배포 결과 요약 (Actions Summary 탭에 표시)
        run: |
          echo "### 🚀 Production 배포 완료" >> "$GITHUB_STEP_SUMMARY"
          echo "- 커밋: \`${{ github.event.workflow_run.head_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

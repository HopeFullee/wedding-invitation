name: CD Deploy Production

# "CI Test (Merge)" 워크플로우(=main/master로의 merge 시점)가 완료되면 트리거됩니다.
on:
  workflow_run:
    workflows: ["CI Test Merge"]
    types:
      - completed

# Vercel에 배포만 하면 되므로 코드를 읽는 권한만 있으면 됩니다.
permissions:
  contents: read

concurrency:
  group: cd-deploy-production
  cancel-in-progress: false # production 배포는 중간에 취소하지 않고 순서대로 진행합니다.

jobs:
  deploy-production:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    # "CI Test (Merge)"는 이제 push(main/master) 트리거 전용 워크플로우이므로
    # 성공 여부만 확인하면 됩니다. (이벤트 종류로 다시 필터링할 필요가 없어졌습니다)
    if: github.event.workflow_run.conclusion == 'success'

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
      # [핵심] workflow_run 이벤트에 맞는 올바른 컨텍스트 매핑
      VERCEL_GIT_COMMIT_REF: ${{ github.event.workflow_run.head_branch }}
      VERCEL_GIT_COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      # merge된 실제 커밋(head_sha) 기준으로 체크아웃합니다.
      - name: 코드 체크아웃 (merge된 커밋 기준)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERCEL_GIT_COMMIT_SHA }}

      # [추가] Detached HEAD 상태인 러너에 강제로 로컬 main 브랜치를 만들어 줍니다.
      - name: 로컬 Git 브랜치 강제 설정
        run: |
          git checkout -b main || git switch main
          git branch

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vercel CLI 설치
        run: npm install --global vercel@latest

      # VERCEL_ORG_ID는 Vercel CLI가 요구하는 환경변수명입니다.
      # Hope님이 만들어두신 VERCEL_USER_ID 시크릿 값을 그대로 매핑해서 사용합니다.
      - name: Vercel 프로젝트 환경 정보 가져오기
        run: vercel pull --yes --environment=production --token=${VERCEL_TOKEN}

      - name: 프로덕션 빌드 (Vercel 빌드 아티팩트 생성)
        run: |
          vercel build --prod --token=${VERCEL_TOKEN}

      - name: Vercel에 Production 배포
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${VERCEL_TOKEN})
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: 배포 결과 요약 (Actions Summary 탭에 표시)
        run: |
          echo "### 🚀 Production 배포 완료" >> "$GITHUB_STEP_SUMMARY"
          echo "- 커밋: \`${{ env.VERCEL_GIT_COMMIT_SHA }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

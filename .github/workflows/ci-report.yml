name: CI Report

on:
  workflow_run:
    workflows: ["CI Test PR"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  report:
    name: Publish Test Reports to PR
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'cancelled'

    steps:
      - name: 코드 체크아웃 (PR head 기준)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # [수정] 부모 워크플로우(workflow_run)의 이벤트와 SHA를 조합하여 동적 이름으로 다운로드합니다.
      # ci-test-base.yml에 설정한 패턴과 정확히 일치해야 합니다.
      # 여기서는 "CI Test PR"이 트리거이므로 event_name은 'pull_request'가 됩니다.
      - name: 테스트 결과 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: ci-reports-${{ github.event.workflow_run.event }}-${{ github.event.workflow_run.head_sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: ci-reports

      - name: PR 번호 확인
        id: pr
        run: |
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            PR_NUMBER=$(cat ci-reports/ci-meta/pr-number.txt)
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Coverage 리포트 게시
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: ci-reports/coverage/coverage-summary.json
          json-final-path: ci-reports/coverage/coverage-final.json
          pr-number: ${{ steps.pr.outputs.number }}

      - name: ESLint 리포트 게시
        uses: ataylorme/eslint-annotate-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          report-json: ci-reports/eslint-report.json

      - name: 빌드 결과 리포트 게시
        run: |
          BUILD_STATUS=$(grep "^build=" ci-reports/ci-meta/status.txt | cut -d= -f2)
          echo "### 🔨 빌드 결과" >> "$GITHUB_STEP_SUMMARY"
          if [ "$BUILD_STATUS" = "success" ]; then
            echo "✅ 빌드 성공" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ 빌드 실패" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 50 ci-reports/build-log.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

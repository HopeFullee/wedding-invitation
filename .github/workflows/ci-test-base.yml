name: CI Test Base

# 이 워크플로우는 단독으로 실행되지 않고, ci-test-pr.yml / ci-test-merge.yml에서
# workflow_call로 호출될 때만 동작합니다. (PR 트리거와 merge 트리거의 실제 로직을
# 한 곳에서만 관리하기 위한 재사용 워크플로우입니다)
on:
  workflow_call:

# 이 워크플로우는 "실행"만 담당하므로 코드를 읽는 권한만 있으면 됩니다.
# PR 코멘트 작성 등의 쓰기 권한은 ci-report.yml 쪽에서 별도로 가집니다.
permissions:
  contents: read

jobs:
  test:
    name: Lint, Unit Test & Build
    runs-on: ubuntu-latest

    # husky의 prepare 스크립트가 npm ci 시 자동 실행되는 것을 방지합니다.
    env:
      HUSKY: "0"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치 (package-lock.json 기준 고정 설치)
        run: npm ci

      # 실패해도 결과 파일은 남겨서 아티팩트로 업로드해야 하므로 continue-on-error 사용.
      # 최종 성공/실패 판단은 맨 아래 "최종 결과 판단" 스텝에서 합니다.
      - name: ESLint 검사 (JSON 리포트 생성)
        id: eslint
        continue-on-error: true
        run: npm run lint -- --format json --output-file eslint-report.json

      - name: Vitest 단위 테스트 (coverage 포함)
        id: vitest
        continue-on-error: true
        run: npm run test -- --run --coverage

      - name: 빌드 (타입 체크 + 번들링)
        id: build
        continue-on-error: true
        run: npm run build 2>&1 | tee build-log.txt

      # 각 스텝의 성공/실패 결과와 PR 번호를 파일로 남겨서
      # ci-report.yml이 workflow_run 시점에 참고할 수 있게 합니다.
      # (workflow_call로 호출되어도 github.event_name / github.event는
      #  원래 트리거인 pull_request 또는 push 값을 그대로 유지합니다)
      - name: 결과 메타데이터 저장
        if: always()
        run: |
          mkdir -p ci-meta
          echo "${{ github.event_name }}" > ci-meta/event-name.txt
          echo "${{ github.event.pull_request.number }}" > ci-meta/pr-number.txt
          echo "eslint=${{ steps.eslint.outcome }}"  > ci-meta/status.txt
          echo "vitest=${{ steps.vitest.outcome }}" >> ci-meta/status.txt
          echo "build=${{ steps.build.outcome }}"   >> ci-meta/status.txt

      # coverage, eslint 리포트, build 로그, 메타데이터를 하나의 아티팩트로 업로드합니다.
      # ci-report.yml이 이 아티팩트를 다운로드해서 실제 리포트를 PR에 게시합니다.
      - name: 리포트용 아티팩트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            coverage/coverage-summary.json
            coverage/coverage-final.json
            eslint-report.json
            build-log.txt
            ci-meta/
          if-no-files-found: warn
          retention-days: 7

      # continue-on-error로 넘어간 스텝들의 실제 성공 여부를 여기서 최종 판단합니다.
      # 이 스텝이 실패해야 이 워크플로우(그리고 브랜치 보호 규칙)가 최종 "실패"로 표시됩니다.
      - name: 최종 결과 판단
        if: always()
        run: |
          if [ "${{ steps.eslint.outcome }}" != "success" ] || \
             [ "${{ steps.vitest.outcome }}" != "success" ] || \
             [ "${{ steps.build.outcome }}" != "success" ]; then
            echo "하나 이상의 검사가 실패했습니다. (eslint: ${{ steps.eslint.outcome }}, vitest: ${{ steps.vitest.outcome }}, build: ${{ steps.build.outcome }})"
            exit 1
          fi

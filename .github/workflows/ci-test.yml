name: auto-test

# main(master) 브랜치로 향하는 Pull Request에서만 실행됩니다.
# (dev, feature/* 등 브랜치명은 자유형이므로, "어떤 브랜치에서 왔는지"가 아니라
#  "main/master로 들어오는 PR인지"를 기준으로 필터링합니다.)
on:
  pull_request:
    branches:
      - main
      - master

# 이 워크플로우가 리포지토리에 대해 가질 권한을 최소화합니다.
# (코드를 읽기만 하면 되므로 그 외 권한은 부여하지 않습니다)
permissions:
  contents: read

# 같은 PR에서 커밋을 push하면 이전 실행은 취소하고 최신 커밋만 검사합니다.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Lint, Unit Test & Build Check
    runs-on: ubuntu-latest

    # husky의 prepare 스크립트가 npm ci 시 자동 실행되는 것을 방지합니다.
    # (CI 환경에는 git hook 설정이 불필요하고, 오히려 실패 원인이 될 수 있습니다)
    env:
      HUSKY: "0"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 의존성 설치 (package-lock.json 기준 고정 설치)
        run: npm ci

      - name: ESLint 검사
        run: npm run lint

      - name: Vitest 단위 테스트
        # test 스크립트가 "vitest" (watch 모드)이므로 --run으로 1회성 실행을 강제합니다.
        run: npm run test -- --run

      - name: 빌드 (타입 체크 + 번들링, 충돌 여부 확인)
        # build 스크립트에 "tsc -b"가 포함되어 있어 타입 에러도 함께 검출됩니다.
        run: npm run build
